<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCB Barreiro – GTFS Transit Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:#0d1117}
#map{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;background:#0d1117}

.panel{
  position:absolute;top:16px;left:16px;z-index:1000;
  background:rgba(13,17,23,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;padding:20px;width:280px;
  max-height:calc(100vh - 32px);overflow-y:auto;
  color:#e6edf3;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px}

.panel h1{
  font-family:'Space Mono',monospace;font-size:11px;
  letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,0.4);margin-bottom:4px;
}
.panel h2{
  font-size:20px;font-weight:700;margin-bottom:2px;
  background:linear-gradient(135deg,#58a6ff,#bc8cff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.panel .subtitle{font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:16px;font-family:'Space Mono',monospace}

.stats{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;
}
.stat{
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);
  border-radius:10px;padding:10px;text-align:center;
}
.stat .val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:#58a6ff}
.stat .lbl{font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

.sep{height:1px;background:rgba(255,255,255,0.06);margin:12px 0}

.line-list{display:flex;flex-direction:column;gap:4px}
.line-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:10px;cursor:pointer;
  transition:all 0.2s;border:1px solid transparent;
}
.line-item:hover{background:rgba(255,255,255,0.06);border-color:rgba(255,255,255,0.1)}
.line-item.active{background:rgba(88,166,255,0.1);border-color:rgba(88,166,255,0.25)}
.line-item.dimmed{opacity:0.25}

.line-badge{
  width:36px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
  flex-shrink:0;color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.line-desc{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.3;flex:1;min-width:0}
.line-desc span{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.toggle-stops{
  display:flex;align-items:center;gap:8px;padding:8px 0;cursor:pointer;
  font-size:12px;color:rgba(255,255,255,0.5);
}
.toggle-stops input{accent-color:#58a6ff}

.btn-all{
  width:100%;padding:8px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);
  border-radius:8px;cursor:pointer;font-size:11px;
  font-family:'Space Mono',monospace;letter-spacing:1px;
  text-transform:uppercase;transition:all 0.2s;
}
.btn-all:hover{background:rgba(255,255,255,0.08);color:#fff}

.leaflet-popup-content-wrapper{
  background:rgba(13,17,23,0.95)!important;
  border:1px solid rgba(255,255,255,0.1)!important;
  border-radius:12px!important;color:#e6edf3!important;
  box-shadow:0 8px 32px rgba(0,0,0,0.5)!important;
}
.leaflet-popup-tip{background:rgba(13,17,23,0.95)!important;border:1px solid rgba(255,255,255,0.1)!important}
.leaflet-popup-content{font-family:'DM Sans',sans-serif!important;font-size:13px!important}
.popup-title{font-weight:700;font-size:14px;margin-bottom:4px}
.popup-line{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;color:#fff;margin:1px}

.leaflet-control-zoom a{
  background:rgba(13,17,23,0.9)!important;color:#e6edf3!important;
  border-color:rgba(255,255,255,0.1)!important;
}
.leaflet-control-zoom a:hover{background:rgba(30,38,50,0.95)!important}
.leaflet-control-attribution{
  background:rgba(13,17,23,0.7)!important;color:rgba(255,255,255,0.3)!important;
  font-size:9px!important;
}
.leaflet-control-attribution a{color:rgba(255,255,255,0.4)!important}

@media(max-width:600px){
  .panel{width:calc(100% - 32px);max-height:40vh;top:auto;bottom:16px}
}
</style>
</head>
<body>
<div id="map"></div>

  <label class="toggle-stops">

  <div class="sep"></div>
  
  <button class="btn-all" id="showAll">Show All Lines</button>
  
  <div style="height:8px"></div>
  <div class="line-list" id="lineList"></div>
</div>

const map = L.map('map', {
  zoomControl: true,
  attributionControl: true,
}).setView([38.645, -9.07], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
}).addTo(map);

// Build line layers
const lineLayers = {};
const lineItems = {};
let activeLine = null;

DATA.l.forEach(line => {
  const group = L.layerGroup();
  line.s.forEach(coords => {
    const latlngs = coords.map(c => [c[1], c[0]]);
    // Glow
    L.polyline(latlngs, {
      color: line.c, weight: 8, opacity: 0.15,
      lineCap: 'round', lineJoin: 'round',
    }).addTo(group);
    // Main
    L.polyline(latlngs, {
      color: line.c, weight: 3.5, opacity: 0.85,
      lineCap: 'round', lineJoin: 'round',
    }).addTo(group).bindPopup(
      '<div class="popup-title">Line ' + line.n + '</div>' +
      '<div style="color:rgba(255,255,255,0.5);font-size:12px">' + line.d + '</div>'
    );
  });
  group.addTo(map);
  lineLayers[line.n] = group;
});

// Stops layer
const stopsLayer = L.layerGroup();
DATA.t.forEach(stop => {
  L.circleMarker([stop.la, stop.lo], {
    radius: 4, fillColor: '#58a6ff', color: 'rgba(88,166,255,0.3)',
    weight: 3, fillOpacity: 0.9,
  }).bindPopup('<div class="popup-title">' + stop.n + '</div>')
   .addTo(stopsLayer);
});

// Build line list
const listEl = document.getElementById('lineList');
DATA.l.forEach(line => {
  const el = document.createElement('div');
  el.className = 'line-item';
  el.innerHTML = '<div class="line-badge" style="background:' + line.c + '">' + line.n + '</div>' +
    '<div class="line-desc"><span>' + line.d + '</span></div>';
  el.addEventListener('click', () => toggleLine(line.n));
  listEl.appendChild(el);
  lineItems[line.n] = el;
});

function toggleLine(name) {
  if (activeLine === name) {
    // Deselect - show all
    activeLine = null;
    showAllLines();
    return;
  }
  activeLine = name;
  Object.keys(lineLayers).forEach(n => {
    const layer = lineLayers[n];
    const item = lineItems[n];
    if (n === name) {
      map.addLayer(layer);
      layer.eachLayer(l => { if(l.setStyle) l.setStyle({opacity: n===name?0.9:0.15}); });
      item.className = 'line-item active';
    } else {
      layer.eachLayer(l => { if(l.setStyle) l.setStyle({opacity:0.12}); });
      map.addLayer(layer);
      item.className = 'line-item dimmed';
    }
  });
  // Fit to selected line bounds
  const group = lineLayers[name];
  const bounds = group.getBounds();
  if (bounds.isValid()) map.fitBounds(bounds, {padding: [60, 60]});
}

function showAllLines() {
  activeLine = null;
  Object.keys(lineLayers).forEach(n => {
    const layer = lineLayers[n];
    map.addLayer(layer);
    layer.eachLayer(l => {
      if(l.setStyle) {
        const w = l.options.weight;
        l.setStyle({opacity: w > 5 ? 0.15 : 0.85});
      }
    });
    lineItems[n].className = 'line-item';
  });
}

document.getElementById('showAll').addEventListener('click', showAllLines);

document.getElementById('showStops').addEventListener('change', function() {
  if (this.checked) map.addLayer(stopsLayer);
  else map.removeLayer(stopsLayer);
});

// Fit to all data
const allBounds = L.latLngBounds([]);
Object.values(lineLayers).forEach(g => {
  const b = g.getBounds();
  if (b.isValid()) allBounds.extend(b);
});
if (allBounds.isValid()) map.fitBounds(allBounds, {padding: [40, 40]});
</script>
